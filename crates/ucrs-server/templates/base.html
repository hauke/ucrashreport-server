<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ instance }}{% endblock %}</title>
<style>
body { font-family: system-ui, sans-serif; margin: 0; color: #222; }
header { background: #00425e; color: #fff; padding: .6rem 1rem; display: flex; gap: 1rem; align-items: baseline; }
header a { color: #fff; text-decoration: none; }
header .spacer { flex: 1; }
main { padding: 1rem; max-width: 75rem; margin: 0 auto; }
table { border-collapse: collapse; width: 100%; margin: .8rem 0; }
th, td { text-align: left; padding: .35rem .6rem; border-bottom: 1px solid #ddd; font-size: .92rem; }
th { background: #f3f5f7; }
tr:hover td { background: #f8fafc; }
pre { background: #f6f8fa; border: 1px solid #ddd; padding: .8rem; overflow-x: auto; font-size: .85rem; }
form.inline { display: inline; }
input, select, button { font: inherit; padding: .25rem .5rem; }
button { cursor: pointer; }
.filters { display: flex; gap: .6rem; flex-wrap: wrap; align-items: end; }
.filters label { display: flex; flex-direction: column; font-size: .8rem; color: #555; }
.muted { color: #777; font-size: .85rem; }
.badge { display: inline-block; padding: 0 .45rem; border-radius: .6rem; background: #e5eef5; font-size: .8rem; }
.error { color: #b00020; }
.kv { display: grid; grid-template-columns: max-content 1fr; gap: .2rem .8rem; }
.kv dt { color: #666; }
.kv dd { margin: 0; }
.cols { display: flex; gap: 2rem; flex-wrap: wrap; }
.cols > div { flex: 1; min-width: 16rem; }
</style>
</head>
<body>
<header>
	<a href="/groups"><strong>{{ instance }}</strong></a>
	{% block nav %}{% endblock %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
